# ===== 通知：QQ邮箱 =====
notify:
  enabled: true
  provider: email
  email:
    smtp_server: smtp.qq.com
    smtp_port: 465
    use_ssl: true
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    to: ${EMAIL_TO}
    subject_template: "浙江三农新闻 {date}"

# ===== GitHub Pages =====
pages:
  enabled: true
  title: 浙江三农新闻
  subtitle: 浙江农业农村政策与产业动态
  archive_days: 30
