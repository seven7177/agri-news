  - 余姚 - 慈溪 - 奉化 - 象山 - 宁海
  - 鹿城 - 龙湾 - 瓯海 - 瑞安 - 乐清 - 洞头
  - 永嘉 - 平阳 - 苍南 - 文成 - 泰顺
  - 南湖 - 秀洲 - 海宁 - 平湖 - 桐乡 - 嘉善 - 海盐
  - 吴兴 - 南浔 - 德清 - 长兴 - 安吉
  - 越城 - 诸暨 - 上虞 - 嵊州 - 绍兴 - 新昌
