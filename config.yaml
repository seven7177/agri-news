# ===== LLM 配置（暂不使用）=====
llm:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat
  max_tokens: 4096
  temperature: 0.7

# ===== 爬虫配置 =====
scraper:
  delay_min: 1
  delay_max: 2
  retry_max: 1
  retry_delay: 5
  timeout: 10

# ===== 农业关键词（全局统一，所有源共用）=====
agri_keywords:
  - 农业 - 农村 - 农民 - 农田 - 农户 - 土地
  - 粮食 - 乡村振兴 - 耕地 - 三农 - 乡村
  - 渔船 - 渔业 - 渔民 - 水果 - 蔬菜 - 茶叶
  - 养殖 - 畜牧 - 种植 - 水稻 - 小麦 - 农场
  - 樱桃 - 杨梅 - 草莓 - 西瓜 - 柑橘 - 椪柑
  - 葡萄 - 西湖龙井 - 玉米 - 大豆 - 棉花 - 油菜 - 甘蔗

