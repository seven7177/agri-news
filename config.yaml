# ============================================================
# 三农新闻日报 — 系统配置文件
# ============================================================

llm:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat
  max_tokens: 4096
  temperature: 0.7

# ============================================================
# 新闻源列表
# ============================================================
sources:
  - name: 人民日报
    handler: general_news
    url: https://paper.people.com.cn
    category_lists:
      - 综合要闻
      - 政策法规
    priority: 1
    enabled: true

  - name: 新华社
    handler: general_news
    url: https://www.xinhuanet.com
    category_lists:
      - 综合要闻
      - 政策法规
    priority: 1
    enabled: true

  - name: 央视新闻
    handler: general_news
    url: https://news.cctv.com
    category_lists:
      - 综合要闻
    priority: 1
    enabled: true

  - name: 农民日报
    handler: agriculture_news
    url: https://www.farmer.com.cn
    category_lists:
      - 政策法规
      - 产业动态
      - 乡村振兴
    filter_keywords:
      - 农业
      - 农村
      - 农民
      - 乡村振兴
      - 粮食
    priority: 1
    enabled: true

  - name: 中新社
    handler: general_news
    url: https://www.chinanews.com.cn
    category_lists:
      - 综合要闻
    priority: 2
    enabled: true

  - name: 光明日报
    handler: general_news
    url: https://www.gmw.cn
    category_lists:
      - 综合要闻
      - 乡村振兴
    priority: 2
    enabled: true

  - name: 经济日报
    handler: general_news
    url: https://www.ce.cn
    category_lists:
      - 市场行情
      - 产业动态
    priority: 2
    enabled: true

  - name: 浙江日报
    handler: general_news
    url: https://zjrb.zjol.com.cn
    category_lists:
      - 地方实践
      - 综合要闻
    priority: 2
    enabled: true

  - name: 中国蓝新闻
    handler: general_news
    url: https://www.cztv.com
    category_lists:
      - 地方实践
    priority: 3
    enabled: true

  - name: 潮新闻
    handler: general_news
    url: https://tidenews.com.cn
    category_lists:
      - 地方实践
      - 综合要闻
    priority: 3
    enabled: true

  - name: 浙江在线
    handler: general_news
    url: https://www.zjol.com.cn
    category_lists:
      - 地方实践
    priority: 3
    enabled: true

  - name: 央视网
    handler: general_news
    url: https://www.cctv.com
    category_lists:
      - 综合要闻
      - 政策法规
    priority: 2
    enabled: true

  - name: 央广网
    handler: general_news
    url: https://www.cnr.cn
    category_lists:
      - 综合要闻
    priority: 2
    enabled: true

  - name: 人民网
    handler: general_news
    url: https://www.people.com.cn
    category_lists:
      - 综合要闻
      - 政策法规
    priority: 1
    enabled: true

  - name: 都市快报
    handler: general_news
    url: https://www.dskb.cn
    category_lists:
      - 地方实践
    priority: 3
    enabled: true

# ============================================================
# 爬虫配置
# ============================================================
scraper:
  delay_min: 2
  delay_max: 5
  retry_max: 2
  retry_delay: 10
  timeout: 15
  max_articles_per_source: 30

# ============================================================
# 分析器配置
# ============================================================
analyzer:
  batch_size: 10
  min_relevance_score: 6
  min_importance_score: 3
  categories:
    - 政策法规
    - 粮食安全
    - 产业发展
    - 乡村振兴
    - 科技兴农
    - 生态环保
    - 农产品市场
    - 其他
  prompts:
    domain: 三农
    layer1_system: "你是{domain}新闻资深编辑。"
    layer2_system: "你是中国{domain}日报主编。"

# ============================================================
# 通知配置
# ============================================================
notify:
  enabled: true
  provider: pushplus
  pushplus_token: ${PUSHPLUS_TOKEN}
  success:
    enabled: true
    brief_max_chars: 600
  failure:
    enabled: true
    min_failed_sources: 3
    max_errors: 8

# ============================================================
# 页面配置
# ============================================================
pages:
  enabled: true
  title: 三农新闻日报
  subtitle: 农业农村政策与产业动态简报
  archive_days: 30
